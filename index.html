<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT2213 Applied Cryptography Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--sf:#111827;--sf2:#1a2236;--bd:#2a3456;--ac:#22d3ee;--ac2:#a78bfa;--ok:#34d399;--no:#f87171;--tx:#e2e8f0;--td:#64748b;--tb:#f8fafc;--yw:#facc15}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(34,211,238,.06),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.06),transparent 50%);pointer-events:none;z-index:0}
.ct{max-width:820px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}
.hd{text-align:center;padding:48px 0 32px}
.hd h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hd p{color:var(--td);font-size:.95rem;font-weight:300}
.mn{font-family:'JetBrains Mono',monospace}
.tg{display:grid;grid-template-columns:1fr;gap:12px;margin:24px 0}
@media(min-width:600px){.tg{grid-template-columns:1fr 1fr}}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--ac);opacity:0;transition:opacity .25s}
.tc:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 32px rgba(34,211,238,.08)}
.tc:hover::before,.tc.sl::before{opacity:1}
.tc.sl{border-color:var(--ac);background:rgba(34,211,238,.05)}
.tc h3{font-size:.95rem;font-weight:700;color:var(--tb);margin-bottom:4px}
.tc>span{font-size:.8rem;color:var(--td);font-weight:300}
.tn{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--ac);font-weight:700;margin-bottom:6px;display:block}
.bt{font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;border:none;border-radius:10px;padding:14px 32px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.bp{background:linear-gradient(135deg,var(--ac),#06b6d4);color:var(--bg);box-shadow:0 4px 20px rgba(34,211,238,.25)}.bp:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(34,211,238,.35)}.bp:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.bs{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.bs:hover{border-color:var(--ac);color:var(--ac)}
.bg_{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.qp{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--td)}
.qt{font-size:.8rem;color:var(--ac);font-weight:500}
.pb{width:100%;height:4px;background:var(--sf2);border-radius:4px;margin-bottom:32px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:4px;transition:width .4s}
.timer{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--td);display:flex;align-items:center;gap:6px;background:var(--sf2);padding:6px 14px;border-radius:8px;border:1px solid var(--bd)}
.timer svg{width:14px;height:14px;stroke:var(--ac);fill:none;stroke-width:2}
.timer.warn{color:var(--no);border-color:rgba(248,113,113,.3)}.timer.warn svg{stroke:var(--no)}
.qc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:32px;margin-bottom:20px;animation:fu .4s}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.qc h2{font-size:1.05rem;font-weight:700;color:var(--tb);line-height:1.6;margin-bottom:24px}
.qc code{font-family:'JetBrains Mono',monospace;background:var(--sf2);padding:2px 8px;border-radius:4px;font-size:.85rem;color:var(--ac)}
.os{display:flex;flex-direction:column;gap:10px}
.op{background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s;font-size:.93rem;line-height:1.5;display:flex;align-items:flex-start;gap:12px}
.op:hover:not(.ds){border-color:rgba(34,211,238,.5);background:rgba(34,211,238,.04)}
.ol{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;color:var(--td);background:var(--bg);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.op.ok{border-color:var(--ok);background:rgba(52,211,153,.08)}.op.ok .ol{color:var(--bg);background:var(--ok)}
.op.no{border-color:var(--no);background:rgba(248,113,113,.08)}.op.no .ol{color:var(--bg);background:var(--no)}
.op.ds{cursor:default}.op.dm{opacity:.45}
.ms-tag{display:inline-block;font-size:.7rem;font-weight:700;color:var(--ac2);background:rgba(167,139,250,.12);padding:3px 10px;border-radius:6px;margin-left:8px;vertical-align:middle}
.op.sel{border-color:var(--ac2);background:rgba(167,139,250,.08)}.op.sel .ol{color:var(--bg);background:var(--ac2)}
.cb{width:16px;height:16px;border:2px solid var(--bd);border-radius:4px;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px;color:transparent}
.op.sel .cb{border-color:var(--ac2);background:var(--ac2);color:var(--bg)}
.op.ok .cb{border-color:var(--ok);background:var(--ok);color:var(--bg)}
.op.no .cb{border-color:var(--no);background:var(--no);color:var(--bg)}
.op.dm .cb{opacity:.45}
.sub-btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:.9rem;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;background:var(--ac2);color:var(--bg);margin-top:16px;transition:all .2s;box-shadow:0 2px 12px rgba(167,139,250,.25)}.sub-btn:hover{transform:translateY(-1px)}.sub-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.ex{margin-top:20px;padding:16px 20px;border-radius:10px;font-size:.88rem;line-height:1.65;animation:fu .3s}
.ex.ex-ok{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2)}.ex.ex-ok strong{color:var(--ok)}
.ex.ex-no{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2)}.ex.ex-no strong{color:var(--no)}
/* Difficulty badges */
.diff{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:8px;vertical-align:middle;letter-spacing:.04em}
.diff-E{color:var(--ok);background:rgba(52,211,153,.12)}
.diff-M{color:var(--yw);background:rgba(250,204,21,.12)}
.diff-H{color:var(--no);background:rgba(248,113,113,.12)}
/* Results */
.rs{text-align:center;animation:fu .5s}
.sr{width:180px;height:180px;margin:32px auto;position:relative}.sr svg{width:100%;height:100%;transform:rotate(-90deg)}.sr circle{fill:none;stroke-width:8}.sr .bg2{stroke:var(--sf2)}.sr .fg{stroke:var(--ac);stroke-linecap:round;transition:stroke-dashoffset 1.5s}
.st{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.st .nm{font-size:2.8rem;font-weight:900;color:var(--tb);line-height:1}.st .lb{font-size:.75rem;color:var(--td);margin-top:4px;font-weight:500}
.rs h2{font-size:1.5rem;font-weight:900;color:var(--tb);margin-bottom:8px}
.gd{font-size:1rem;font-weight:700;padding:6px 16px;border-radius:8px;display:inline-block;margin:12px 0 24px}
.gd.a{background:rgba(52,211,153,.12);color:var(--ok)}.gd.b{background:rgba(34,211,238,.12);color:var(--ac)}.gd.c{background:rgba(250,204,21,.12);color:var(--yw)}.gd.f{background:rgba(248,113,113,.12);color:var(--no)}
.tb_{text-align:left;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px;margin:24px 0}
.tb_ h3{font-size:.85rem;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.br{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}.br:last-child{border:none}.br span:first-child{font-size:.88rem}.br span:last-child{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700}
.rt_{font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--td);margin-top:8px}
/* Review */
.rv{text-align:left;margin:32px 0}
.rv h3{font-size:1rem;font-weight:700;color:var(--tb);margin-bottom:16px}
.rv-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.rv-tab{font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--td);cursor:pointer;transition:all .2s}
.rv-tab.act{border-color:var(--ac);color:var(--ac);background:rgba(34,211,238,.08)}.rv-tab:hover{border-color:var(--ac)}
.rv-q{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px;text-align:left}
.rv-q.rv-ok{border-left:4px solid var(--ok)}.rv-q.rv-no{border-left:4px solid var(--no)}
.rv-q h4{font-size:.9rem;font-weight:600;color:var(--tb);line-height:1.5;margin-bottom:12px}
.rv-q h4 code{font-family:'JetBrains Mono',monospace;background:var(--sf2);padding:2px 6px;border-radius:3px;font-size:.8rem;color:var(--ac)}
.rv-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.rv-o{font-size:.84rem;padding:8px 12px;border-radius:6px;background:var(--sf2);color:var(--td);display:flex;align-items:flex-start;gap:8px}
.rv-o.rv-c{color:var(--ok);background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15)}
.rv-o.rv-w{color:var(--no);background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15)}
.rv-o .rv-m{width:18px;flex-shrink:0;font-size:.75rem;font-weight:700;text-align:center}
.rv-exp{font-size:.82rem;color:var(--td);line-height:1.55;padding:10px 12px;background:rgba(34,211,238,.03);border-radius:6px;border:1px solid rgba(34,211,238,.08)}
.cl{display:flex;justify-content:space-between;align-items:center;margin:16px 0 4px;flex-wrap:wrap;gap:8px}
.sa{font-size:.82rem;color:var(--ac);cursor:pointer;font-weight:500;background:none;border:none;font-family:'Outfit',sans-serif}.sa:hover{text-decoration:underline}
.qn{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--td)}
@media(max-width:480px){.qc{padding:20px}.hd{padding:32px 0 20px}.hd h1{font-size:1.4rem}}
</style>
</head>

<script>
const Q=(()=>{try{return eval('['+atob(_qd)+']')}catch(e){console.error('Load error:',e);return[]}})();
const DL={E:'EASY',M:'MEDIUM',H:'HARD'};
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function isM(q){return Array.isArray(q.m)}
function cor(q,a){if(isM(q)){if(!Array.isArray(a))return false;const s=new Set(a),c=new Set(q.m);if(s.size!==c.size)return false;for(const v of s)if(!c.has(v))return false;return true}return a===q.a}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function dB(d){return d?`<span class="diff diff-${d}">${DL[d]||d}</span>`:''}

const T=[...new Set(Q.map(x=>x.t))];
let S={s:'home',sl:new Set(T),qs:[],ci:0,an:[],ms:new Set(),ts:0,ti:null,rf:'all'};
function gQ(){return sh(Q.filter(x=>S.sl.has(x.t)))}
function stT(){S.ts=0;if(S.ti)clearInterval(S.ti);S.ti=setInterval(()=>{S.ts++;const el=document.getElementById('tmr');if(el)el.textContent=fmt(S.ts)},1000)}
function spT(){if(S.ti){clearInterval(S.ti);S.ti=null}}
function r(){document.getElementById('app').innerHTML='';({home:rH,quiz:rQ,results:rR})[S.s](document.getElementById('app'))}

function rH(el){
  spT();
  const al=S.sl.size===T.length,cn=Q.filter(x=>S.sl.has(x.t)).length;
  el.innerHTML=`<div class="hd"><h1>ICT2213 Applied Cryptography</h1><p>Interactive revision · <span class="mn">${Q.length} questions</span></p></div>
<div class="cl"><button class="sa" onclick="tA()">${al?'Deselect All':'Select All'}</button><span class="qn">${cn} questions selected</span></div>
<div class="tg">${T.map(t=>`<div class="tc ${S.sl.has(t)?'sl':''}" onclick="tT('${t}')"><span class="tn">${t.split('.')[0].trim()}</span><h3>${t.split('. ')[1]}</h3><span>${Q.filter(x=>x.t===t).length} questions</span></div>`).join('')}</div>
<div class="bg_"><button class="bt bp" onclick="go()" ${!S.sl.size?'disabled':''}>Start Quiz →</button></div>`}

function rQ(el){
  const q=S.qs[S.ci],n=S.qs.length,p=S.ci/n*100,d=S.an[S.ci]!=null,multi=isM(q),u=S.an[S.ci];
  const uSet=multi&&Array.isArray(u)?new Set(u):(u!=null&&!multi?new Set([u]):new Set());
  const cSet=multi?new Set(q.m):new Set([q.a]);
  const isC=d&&cor(q,u);
  el.innerHTML=`<div class="qh"><span class="qt">${q.t} ${dB(q.d)}</span>
<div class="timer${S.ts>=3600?' warn':''}"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="tmr">${fmt(S.ts)}</span></div>
<span class="qp">${S.ci+1}/${n}</span></div>
<div class="pb"><div class="pf" style="width:${p}%"></div></div>
<div class="qc"><h2>${q.q} ${multi?'<span class="ms-tag">MULTI-SELECT</span>':''}</h2><div class="os">${q.o.map((o,i)=>{
  let c='op';
  if(d){c+=' ds';if(cSet.has(i))c+=' ok';else if(uSet.has(i)&&!cSet.has(i))c+=' no';else c+=' dm'}
  else if(multi&&S.ms.has(i))c+=' sel';
  return`<div class="${c}" onclick="${multi?(d?'':`mt(${i})`):(`pk(${i})`)}">${multi?`<span class="cb">${d?(cSet.has(i)?'✓':(uSet.has(i)?'✗':'')):(S.ms.has(i)?'✓':'')}</span>`:`<span class="ol">${'ABCD'[i]}</span>`}<span>${o}</span></div>`}).join('')}
${multi&&!d?`<button class="sub-btn" onclick="sm()" ${S.ms.size===0?'disabled':''}>Submit Answer</button>`:''}</div>
${d?`<div class="ex ${isC?'ex-ok':'ex-no'}"><strong>${isC?'✓ Correct':'✗ Incorrect'}</strong> — ${q.e}</div>`:''}</div>
<div class="bg_">${d?(S.ci<n-1?`<button class="bt bp" onclick="nx()">Next →</button>`:`<button class="bt bp" onclick="rs()">Results →</button>`):''}
<button class="bt bs" onclick="rt()">⟲ Restart</button></div>`}

function rR(el){
  spT();
  const n=S.qs.length,cc=S.an.filter((a,i)=>cor(S.qs[i],a)).length,p=Math.round(cc/n*100);
  const ci=2*Math.PI*76,of_=ci-p/100*ci;
  const wn=n-cc;
  let gc,gl;if(p>=85){gc='a';gl='Excellent'}else if(p>=70){gc='b';gl='Good'}else if(p>=50){gc='c';gl='Needs Work'}else{gc='f';gl='Review Material'}
  const bd={};S.qs.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(cor(q,S.an[i]))bd[q.t].c++});
  const f=S.rf;
  const revH=S.qs.map((q,i)=>{
    const isC=cor(q,S.an[i]);
    if(f==='correct'&&!isC)return'';if(f==='wrong'&&isC)return'';
    const multi=isM(q),u=S.an[i];
    const uSet=multi&&Array.isArray(u)?new Set(u):(u!=null&&!multi?new Set([u]):new Set());
    const cSet=multi?new Set(q.m):new Set([q.a]);
    return`<div class="rv-q ${isC?'rv-ok':'rv-no'}"><h4><span style="color:${isC?'var(--ok)':'var(--no)'}">${isC?'✓':'✗'}</span> Q${i+1}. ${q.q} ${dB(q.d)}</h4>
<div class="rv-opts">${q.o.map((o,j)=>{
  let cls='rv-o';const isCor=cSet.has(j),isPick=uSet.has(j);
  if(isCor)cls+=' rv-c';else if(isPick&&!isCor)cls+=' rv-w';
  const mk=isCor?'✓':(isPick&&!isCor?'✗':'·');
  return`<div class="${cls}"><span class="rv-m">${mk}</span><span>${'ABCD'[j]}. ${o}</span></div>`}).join('')}</div>
<div class="rv-exp">${q.e}</div></div>`}).join('');
  el.innerHTML=`<div class="rs"><div class="hd"><h1>Quiz Complete</h1></div>
<div class="sr"><svg viewBox="0 0 160 160"><circle class="bg2" cx="80" cy="80" r="76"/><circle class="fg" cx="80" cy="80" r="76" stroke-dasharray="${ci}" stroke-dashoffset="${of_}"/></svg>
<div class="st"><div class="nm">${p}%</div><div class="lb">${cc}/${n}</div></div></div>
<h2>${gl}</h2><div class="gd ${gc}">${p}%</div>
<div class="rt_">⏱ ${fmt(S.ts)} · ${cc} correct · ${wn} wrong</div>
<div class="tb_"><h3>Topic Breakdown</h3>${Object.entries(bd).map(([t,d])=>{const tp=Math.round(d.c/d.t*100),cl=tp>=80?'var(--ok)':tp>=50?'var(--ac)':'var(--no)';
return`<div class="br"><span>${t}</span><span style="color:${cl}">${d.c}/${d.t} (${tp}%)</span></div>`}).join('')}</div>
<div class="rv"><h3>Full Review</h3>
<div class="rv-tabs"><div class="rv-tab ${f==='all'?'act':''}" onclick="srf('all')">All (${n})</div><div class="rv-tab ${f==='wrong'?'act':''}" onclick="srf('wrong')">Wrong (${wn})</div><div class="rv-tab ${f==='correct'?'act':''}" onclick="srf('correct')">Correct (${cc})</div></div>
${revH}</div>
<div class="bg_"><button class="bt bp" onclick="rt()">⟲ Restart</button><button class="bt bs" onclick="hm()">← Topics</button></div></div>`}

function tT(t){S.sl.has(t)?S.sl.delete(t):S.sl.add(t);r()}
function tA(){S.sl=S.sl.size===T.length?new Set():new Set(T);r()}
function go(){S.qs=gQ();S.ci=0;S.an=[];S.ms=new Set();S.rf='all';S.s='quiz';stT();r();scrollTo(0,0)}
function pk(i){if(S.an[S.ci]!=null)return;S.an[S.ci]=i;r()}
function mt(i){if(S.an[S.ci]!=null)return;S.ms.has(i)?S.ms.delete(i):S.ms.add(i);r()}
function sm(){if(S.an[S.ci]!=null||S.ms.size===0)return;S.an[S.ci]=[...S.ms];S.ms=new Set();r()}
function nx(){S.ci++;S.ms=new Set();r();scrollTo(0,0)}
function rs(){S.s='results';S.rf='all';r();scrollTo(0,0)}
function rt(){S.qs=gQ();S.ci=0;S.an=[];S.ms=new Set();S.rf='all';S.s='quiz';stT();r();scrollTo(0,0)}
function hm(){S.s='home';S.ms=new Set();r();scrollTo(0,0)}
function srf(v){S.rf=v;r()}
r();
</script>
</body>

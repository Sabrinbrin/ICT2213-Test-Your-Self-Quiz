<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT2213 Applied Cryptography — Topics 6–9 Quiz (v4)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--s1:#0f1520;--s2:#161d2e;--bd:#1e2940;--ac:#00e5a0;--ac2:#00b4d8;--pr:#c084fc;--yl:#fbbf24;--rd:#f87171;--gn:#34d399;--tx:#dfe6f0;--tx2:#6b7a94;--font:'Sora',sans-serif;--mono:'DM Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(0,229,160,.04),transparent 55%),radial-gradient(ellipse at 70% 100%,rgba(0,180,216,.04),transparent 55%);pointer-events:none}

.wrap{max-width:780px;margin:0 auto;padding:20px 16px;position:relative;z-index:1}

/* Header */
.hd{text-align:center;padding:40px 0 28px}
.hd h1{font-size:clamp(1.5rem,3.5vw,2.2rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hd p{color:var(--tx2);font-size:.88rem;font-weight:300}

/* Stats bar */
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;text-align:center;min-width:100px}
.stat .n{font-size:1.4rem;font-weight:800;color:var(--ac);font-family:var(--mono)}
.stat .l{font-size:.65rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-top:2px}

/* Progress */
.pb{background:var(--s2);border-radius:20px;height:8px;margin:16px 0;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:20px;transition:width .5s ease}

/* Topic filter */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;justify-content:center}
.fbtn{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;font-size:.75rem;font-family:var(--font);color:var(--tx2);cursor:pointer;transition:all .2s}
.fbtn:hover,.fbtn.on{background:var(--s2);border-color:var(--ac);color:var(--ac)}

/* Difficulty filter */
.diffs{display:flex;gap:8px;justify-content:center;margin:8px 0 20px}
.dbtn{font-size:.7rem;padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s1);color:var(--tx2);cursor:pointer;font-family:var(--font);transition:all .2s}
.dbtn:hover,.dbtn.on{border-color:var(--yl);color:var(--yl)}

/* Question card */
.qcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px;margin:16px 0;display:none;animation:fadeIn .3s ease}
.qcard.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qnum{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--ac);font-weight:600;margin-bottom:4px}
.qtopic{font-size:.65rem;color:var(--tx2);margin-bottom:8px}
.qdiff{display:inline-block;font-size:.6rem;padding:2px 8px;border-radius:4px;margin-left:8px}
.qdiff.E{background:rgba(52,211,153,.12);color:var(--gn)}
.qdiff.M{background:rgba(251,191,36,.12);color:var(--yl)}
.qdiff.H{background:rgba(248,113,113,.12);color:var(--rd)}
.qtxt{font-size:.95rem;line-height:1.65;margin-bottom:16px}
.qtxt code{font-family:var(--mono);background:var(--s2);border:1px solid var(--bd);padding:1px 5px;border-radius:3px;font-size:.82rem;color:var(--ac2)}

/* Options */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;cursor:pointer;font-size:.85rem;transition:all .2s;display:flex;align-items:center;gap:10px}
.opt:hover{border-color:var(--ac);background:rgba(0,229,160,.04)}
.opt .mk{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;transition:all .2s}
.opt.sel{border-color:var(--ac);background:rgba(0,229,160,.06)}
.opt.sel .mk{border-color:var(--ac);color:var(--ac)}
.opt.ok{border-color:var(--gn);background:rgba(52,211,153,.06)}
.opt.ok .mk{border-color:var(--gn);background:var(--gn);color:var(--bg)}
.opt.no{border-color:var(--rd);background:rgba(248,113,113,.06);opacity:.6}
.opt.no .mk{border-color:var(--rd);color:var(--rd)}
.opt.disabled{pointer-events:none}

/* TF buttons */
.tfrow{display:flex;gap:10px}
.tfbtn{flex:1;padding:12px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--tx)}
.tfbtn:hover{border-color:var(--ac)}
.tfbtn.sel{border-color:var(--ac);background:rgba(0,229,160,.06)}
.tfbtn.ok{border-color:var(--gn);background:rgba(52,211,153,.1);color:var(--gn)}
.tfbtn.no{border-color:var(--rd);background:rgba(248,113,113,.06);color:var(--rd);opacity:.6}
.tfbtn.disabled{pointer-events:none}

/* SA input */
.sarow{display:flex;gap:10px}
.sarow input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--tx);font-family:var(--mono);font-size:.85rem;outline:none;transition:border .2s}
.sarow input:focus{border-color:var(--ac)}
.sarow input::placeholder{color:#3a4a6a}

/* Submit button */
.sbtn{background:linear-gradient(135deg,var(--ac),var(--ac2));color:var(--bg);border:none;padding:10px 22px;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:var(--font);transition:transform .1s}
.sbtn:hover{transform:translateY(-1px)}
.sbtn:disabled{opacity:.4;cursor:default;transform:none}

/* Feedback */
.fb{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:.82rem;line-height:1.6;display:none}
.fb.ok{display:block;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);color:var(--gn)}
.fb.no{display:block;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);color:var(--rd)}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin:20px 0}
.navbtn{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:8px 18px;color:var(--tx);font-family:var(--font);font-size:.8rem;cursor:pointer;transition:all .2s}
.navbtn:hover{border-color:var(--ac);color:var(--ac)}
.navbtn:disabled{opacity:.3;cursor:default}
.qcount{font-size:.8rem;color:var(--tx2);font-family:var(--mono)}

/* Review */
.rv{margin:20px 0}
.rv-item{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;margin:10px 0}
.rv-q{font-size:.85rem;margin-bottom:8px}
.rv-a{font-size:.8rem;color:var(--tx2)}
.rv-ok{border-left:3px solid var(--gn)}
.rv-no{border-left:3px solid var(--rd)}
.rv-sk{border-left:3px solid var(--tx2)}

/* Mode toggle */
.modes{display:flex;gap:8px;justify-content:center;margin:12px 0}
.mbtn{font-size:.72rem;padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s1);color:var(--tx2);cursor:pointer;font-family:var(--font);transition:all .2s}
.mbtn:hover,.mbtn.on{border-color:var(--pr);color:var(--pr)}

/* Responsive */
@media(max-width:600px){.wrap{padding:12px 10px}.qcard{padding:16px}.stat{min-width:70px;padding:8px 12px}.stat .n{font-size:1.1rem}}

/* Reset button */
.reset{background:transparent;border:1px solid var(--rd);color:var(--rd);padding:6px 14px;border-radius:6px;font-size:.72rem;cursor:pointer;font-family:var(--font);transition:all .2s;margin-top:12px}
.reset:hover{background:rgba(248,113,113,.1)}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
<h1>ICT2213 — Topics 6–9 Quiz (v4)</h1>
<p>Key Management · CIA & Auth Encryption · Network Security · Digital Signatures</p>
</div>

<div class="stats">
<div class="stat"><div class="n" id="sScore">0</div><div class="l">Score</div></div>
<div class="stat"><div class="n" id="sCorrect">0</div><div class="l">Correct</div></div>
<div class="stat"><div class="n" id="sTotal">0</div><div class="l">Questions</div></div>
<div class="stat"><div class="n" id="sPct">0%</div><div class="l">Accuracy</div></div>
</div>
<div class="pb"><div class="pf" id="pBar" style="width:0%"></div></div>

<div class="filters" id="topicFilters"></div>
<div class="diffs" id="diffFilters"></div>
<div class="modes">
<button class="mbtn on" onclick="setMode('quiz')">Quiz Mode</button>
<button class="mbtn" onclick="setMode('review')">Review All</button>
<button class="reset" onclick="resetQuiz()">↻ Reset</button>
</div>

<div id="quizArea"></div>
<div class="nav">
<button class="navbtn" id="prevBtn" onclick="go(-1)">← Prev</button>
<span class="qcount" id="qCounter">1 / 132</span>
<button class="navbtn" id="nextBtn" onclick="go(1)">Next →</button>
</div>
<div id="reviewArea" style="display:none"></div>
</div>

const Q=JSON.parse(atob(_qd));
let filtered=Q.slice(),cur=0,answers={},mode='quiz';
const topics=[...new Set(Q.map(q=>q.t))];
const diffs=[{k:'E',l:'Easy'},{k:'M',l:'Medium'},{k:'H',l:'Hard'}];
let activeTopic=null,activeDiff=null;

function init(){
  const tf=document.getElementById('topicFilters');
  tf.innerHTML='<button class="fbtn on" onclick="filterTopic(null)">All Topics</button>'+
    topics.map(t=>`<button class="fbtn" onclick="filterTopic('${t}')">${t}</button>`).join('');
  const df=document.getElementById('diffFilters');
  df.innerHTML='<button class="dbtn on" onclick="filterDiff(null)">All</button>'+
    diffs.map(d=>`<button class="dbtn" onclick="filterDiff('${d.k}')">${d.l}</button>`).join('');
  document.getElementById('sTotal').textContent=Q.length;
  applyFilter();
}

function filterTopic(t){
  activeTopic=t;
  document.querySelectorAll('.fbtn').forEach((b,i)=>{b.classList.toggle('on',i===0?t===null:b.textContent===t)});
  applyFilter();
}
function filterDiff(d){
  activeDiff=d;
  document.querySelectorAll('.dbtn').forEach((b,i)=>{b.classList.toggle('on',i===0?d===null:b.textContent===diffs.find(x=>x.k===d)?.l)});
  applyFilter();
}
function applyFilter(){
  filtered=Q.filter(q=>(activeTopic===null||q.t===activeTopic)&&(activeDiff===null||q.d===activeDiff));
  cur=0;render();
}

function render(){
  if(mode==='review'){renderReview();return;}
  const area=document.getElementById('quizArea');
  if(!filtered.length){area.innerHTML='<div style="text-align:center;color:var(--tx2);padding:40px">No questions match filters.</div>';return;}
  const q=filtered[cur];
  const gi=Q.indexOf(q);
  const ans=answers[gi];
  const diffL={E:'Easy',M:'Medium',H:'Hard'}[q.d]||'';
  
  let html=`<div class="qcard show"><div class="qnum">Question ${cur+1} of ${filtered.length}<span class="qdiff ${q.d}">${diffL}</span></div>`;
  html+=`<div class="qtopic">${q.t}</div>`;
  html+=`<div class="qtxt">${q.q}</div>`;
  
  if(q.tf!==undefined){
    // True/False
    const done=ans!==undefined;
    html+=`<div class="tfrow">`;
    ['True','False'].forEach((v,i)=>{
      const val=i===0;
      let cls='tfbtn';
      if(done){
        cls+=' disabled';
        if(ans===val)cls+=val===q.tf?' ok':' no';
        if(val===q.tf&&ans!==val)cls+=' ok';
      }
      html+=`<button class="${cls}" onclick="answerTF(${gi},${val})">${v}</button>`;
    });
    html+=`</div>`;
  } else if(q.sa!==undefined){
    // Short answer
    const done=ans!==undefined;
    html+=`<div class="sarow"><input id="saIn" placeholder="Your answer..." ${done?'disabled value="'+(ans||'')+'"':''}><button class="sbtn" onclick="answerSA(${gi})" ${done?'disabled':''}>Submit</button></div>`;
  } else {
    // MC
    const done=ans!==undefined;
    html+=`<div class="opts">`;
    q.o.forEach((o,j)=>{
      let cls='opt';
      if(done){
        cls+=' disabled';
        if(j===ans)cls+=j===q.a?' ok':' no';
        if(j===q.a&&ans!==j)cls+=' ok';
      }
      const mk=done?(j===q.a?'✓':(j===ans?'✗':'·')):'ABCD'[j];
      html+=`<div class="${cls}" onclick="answerMC(${gi},${j})"><span class="mk">${mk}</span>${o}</div>`;
    });
    html+=`</div>`;
  }
  
  if(ans!==undefined){
    const correct=(q.tf!==undefined?ans===q.tf:q.sa!==undefined?checkSA(ans,q.sa):ans===q.a);
    html+=`<div class="fb ${correct?'ok':'no'}">${correct?'✓ Correct!':'✗ Incorrect.'} ${q.e}</div>`;
  }
  html+=`</div>`;
  area.innerHTML=html;
  
  document.getElementById('qCounter').textContent=`${cur+1} / ${filtered.length}`;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur>=filtered.length-1;
  updateStats();
}

function checkSA(given,expected){
  return given.toString().trim().toLowerCase()===expected.toString().trim().toLowerCase();
}

function answerMC(gi,j){if(answers[gi]!==undefined)return;answers[gi]=j;saveState();render();}
function answerTF(gi,v){if(answers[gi]!==undefined)return;answers[gi]=v;saveState();render();}
function answerSA(gi){
  if(answers[gi]!==undefined)return;
  const v=document.getElementById('saIn').value;
  if(!v.trim())return;
  answers[gi]=v.trim();saveState();render();
}

function go(d){cur=Math.max(0,Math.min(filtered.length-1,cur+d));render();}

function updateStats(){
  let correct=0,answered=0;
  Q.forEach((q,i)=>{
    if(answers[i]!==undefined){
      answered++;
      if(q.tf!==undefined?answers[i]===q.tf:q.sa!==undefined?checkSA(answers[i],q.sa):answers[i]===q.a)correct++;
    }
  });
  document.getElementById('sScore').textContent=correct;
  document.getElementById('sCorrect').textContent=`${correct}/${answered}`;
  const pct=answered?Math.round(correct/answered*100):0;
  document.getElementById('sPct').textContent=pct+'%';
  document.getElementById('pBar').style.width=(answered/Q.length*100)+'%';
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase().includes(m)));
  document.getElementById('quizArea').style.display=m==='quiz'?'block':'none';
  document.querySelector('.nav').style.display=m==='quiz'?'flex':'none';
  document.getElementById('reviewArea').style.display=m==='review'?'block':'none';
  if(m==='review')renderReview();else render();
}

function renderReview(){
  const area=document.getElementById('reviewArea');
  let html='<h3 style="color:var(--ac);font-size:1rem;margin-bottom:12px">Review — All Questions</h3>';
  filtered.forEach((q,idx)=>{
    const gi=Q.indexOf(q);
    const ans=answers[gi];
    const done=ans!==undefined;
    let correct=false;
    if(done)correct=q.tf!==undefined?ans===q.tf:q.sa!==undefined?checkSA(ans,q.sa):ans===q.a;
    const cls=done?(correct?'rv-ok':'rv-no'):'rv-sk';
    html+=`<div class="rv-item ${cls}"><div class="rv-q"><strong>Q${idx+1}.</strong> ${q.q}</div>`;
    if(q.o)html+=`<div class="rv-a">Answer: ${q.o[q.a]}</div>`;
    else if(q.tf!==undefined)html+=`<div class="rv-a">Answer: ${q.tf?'True':'False'}</div>`;
    else if(q.sa!==undefined)html+=`<div class="rv-a">Answer: ${q.sa}</div>`;
    html+=`<div class="rv-a" style="margin-top:4px;font-style:italic">${q.e}</div>`;
    if(done)html+=`<div class="rv-a" style="margin-top:4px">${correct?'<span style="color:var(--gn)">✓ You got this right</span>':'<span style="color:var(--rd)">✗ Your answer: '+(q.o?q.o[ans]:ans)+'</span>'}</div>`;
    else html+=`<div class="rv-a" style="color:var(--tx2)">— Not answered yet</div>`;
    html+=`</div>`;
  });
  area.innerHTML=html;
}

function resetQuiz(){
  if(!confirm('Reset all progress?'))return;
  answers={};sessionStorage.removeItem('quiz_t6_9');cur=0;render();
}

function saveState(){sessionStorage.setItem('quiz_t6_9',JSON.stringify(answers));}
function loadState(){try{const s=sessionStorage.getItem('quiz_t6_9');if(s)answers=JSON.parse(s);}catch(e){}}

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(mode!=='quiz')return;
  if(e.key==='ArrowLeft')go(-1);
  else if(e.key==='ArrowRight')go(1);
  else if('1234'.includes(e.key)){
    const gi=Q.indexOf(filtered[cur]);
    const q=filtered[cur];
    if(q&&q.o&&answers[gi]===undefined)answerMC(gi,parseInt(e.key)-1);
  }
});

loadState();init();
</script>
